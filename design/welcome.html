<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TikCal — welcome animation</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Saira:wght@700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:#050608;color:#e8f4f8;font-family:'IBM Plex Mono',monospace;overflow:hidden}
  .scene{position:fixed;inset:0;overflow:hidden;display:flex;align-items:center;justify-content:center}

  .floor{position:absolute;left:-25%;right:-25%;bottom:-2px;height:32%;z-index:0;pointer-events:none;
    background-image:linear-gradient(rgba(76,201,240,.3) 1px,transparent 1px),linear-gradient(90deg,rgba(76,201,240,.3) 1px,transparent 1px);
    background-size:30px 30px;transform:perspective(240px) rotateX(74deg);transform-origin:bottom center;
    -webkit-mask-image:linear-gradient(to top,#000 5%,transparent 82%);mask-image:linear-gradient(to top,#000 5%,transparent 82%)}

  /* blue spotlight beam shining from the top-left corner onto the mascot */
  .spot{position:absolute;top:-8%;left:-8%;width:90vw;height:104vh;z-index:1;opacity:0;pointer-events:none;
    background:radial-gradient(120% 120% at 0% 0%,rgba(130,224,255,.5),rgba(76,201,240,.16) 38%,transparent 66%);
    clip-path:polygon(0% 0%,66% 18%,46% 60%,0% 26%);filter:blur(10px);transition:opacity 1s}
  .flare{position:absolute;top:-50px;left:-50px;width:170px;height:170px;z-index:2;opacity:0;border-radius:50%;
    background:radial-gradient(circle,rgba(210,244,255,.95),rgba(76,201,240,.5) 38%,transparent 70%);filter:blur(3px);transition:opacity 1s}
  .scene.on .spot,.scene.on .flare{opacity:1}

  /* centered column: mascot stands on top of the wordmark */
  .col{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center}
  .mascot{width:300px;max-width:62vw;margin-bottom:-26px;
    filter:drop-shadow(0 0 22px rgba(120,210,255,.25));
    transform:translateY(130vh);transition:transform 1.3s cubic-bezier(.18,.9,.3,1)}
  .scene.on .mascot{transform:translateY(0)}

  .logo3d{font-family:'Saira';font-weight:800;font-size:68px;letter-spacing:-.02em;color:#eaf6fa;line-height:1;
    text-shadow:1px 1px 0 #1c4f63,2px 2px 0 #163f50,3px 3px 0 #11323f,4px 4px 0 #0c2530,5px 6px 13px rgba(0,0,0,.6),0 0 26px rgba(76,201,240,.5),0 0 46px rgba(110,231,183,.18);
    opacity:0;transition:opacity .8s .3s}
  .scene.on .logo3d{opacity:1}
  .tagline{margin-top:12px;font-size:12px;letter-spacing:.2em;color:#4cc9f0;opacity:0;transition:opacity .8s 1.4s}
  .scene.on .tagline{opacity:1}

  .cta{position:absolute;bottom:12%;left:50%;transform:translateX(-50%) translateY(10px);z-index:4;opacity:0;transition:opacity .7s 1.7s,transform .7s 1.7s}
  .scene.on .cta{opacity:1;transform:translateX(-50%) translateY(0)}
  .enter{font-family:'IBM Plex Mono';font-weight:700;font-size:13px;letter-spacing:.08em;background:#6EE7B7;color:#04221a;border:none;border-radius:6px;padding:14px 32px;cursor:pointer}
  .skip{position:absolute;top:18px;right:20px;z-index:5;font-size:11px;color:#5b6b78;background:none;border:none;cursor:pointer;letter-spacing:.08em}
  .replay{position:absolute;bottom:18px;right:20px;z-index:5;font-size:11px;color:#4cc9f0;background:none;border:1px solid rgba(76,201,240,.3);border-radius:5px;padding:7px 12px;cursor:pointer;letter-spacing:.08em}
</style>
</head>
<body>
<div class="scene" id="scene">
  <div class="floor"></div>
  <div class="spot"></div>
  <div class="flare"></div>
  <button class="skip" onclick="finish()">SKIP →</button>

  <div class="col">
    <img class="mascot" src="discoball.png" alt="TikCal disco ball mascot" />
    <div class="logo3d">TikCal</div>
    <div class="tagline">EVERY SOURCE · ONE CALENDAR</div>
  </div>

  <div class="cta"><button class="enter" onclick="finish()">ENTER →</button></div>
  <button class="replay" onclick="run()">↻ REPLAY</button>
</div>

<script>
  const scene=document.getElementById('scene');
  function run(){ scene.classList.remove('on'); void scene.offsetWidth; setTimeout(()=>scene.classList.add('on'),120); }
  function finish(){ alert('→ would route to /calendar and set seen_intro = true'); }
  run();
</script>
</body>
</html>
