<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="s-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#080b12"/>
      <stop offset="0.64" stop-color="#0d1120"/>
      <stop offset="0.66" stop-color="#221934"/>
    </linearGradient>
    <linearGradient id="s-sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8bf3c8"/>
      <stop offset="0.34" stop-color="#ffe08a"/>
      <stop offset="0.64" stop-color="#ff7a30"/>
      <stop offset="1" stop-color="#ff2e7e"/>
    </linearGradient>
    <clipPath id="s-clip"><circle cx="32" cy="28" r="16.5"/></clipPath>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#s-sky)"/>

  <!-- sun, mostly above the horizon -->
  <g clip-path="url(#s-clip)">
    <rect x="15" y="11" width="34" height="34" fill="url(#s-sun)"/>
    <rect x="15" y="35.5" width="34" height="1.6" fill="#0d1120"/>
    <rect x="15" y="40" width="34" height="2.4" fill="#0d1120"/>
  </g>

  <!-- horizon glow line -->
  <rect x="0" y="41.5" width="64" height="1.6" fill="#4cc9f0"/>

  <!-- stepped Tikal ziggurat sitting on the horizon, in front of the sun -->
  <path d="M 29 30 H 35 V 33 H 38 V 36 H 41 V 41.5 H 23 V 36 H 26 V 33 H 29 Z" fill="#070a12"/>
  <g stroke="#4cc9f0" stroke-width="1.3" fill="none" stroke-linejoin="round" opacity="0.9">
    <path d="M 29 30 H 35"/>
    <path d="M 26 33 H 29 M 35 33 H 38"/>
    <path d="M 23 36 H 26 M 38 36 H 41"/>
  </g>

  <!-- minimal dance-floor grid -->
  <g stroke="#4cc9f0" stroke-width="1" opacity="0.7" fill="none">
    <line x1="32" y1="43" x2="18" y2="53"/>
    <line x1="32" y1="43" x2="46" y2="53"/>
    <line x1="10" y1="49" x2="54" y2="49"/>
  </g>
</svg>
