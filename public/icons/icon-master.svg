<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- synth sky -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05070b"/>
      <stop offset="0.42" stop-color="#0a0e16"/>
      <stop offset="0.58" stop-color="#14172a"/>
      <stop offset="0.62" stop-color="#241a33"/>
    </linearGradient>
    <!-- the sun: mint -> yellow -> orange -> magenta -->
    <linearGradient id="sun" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7cf3c4"/>
      <stop offset="0.28" stop-color="#ffe08a"/>
      <stop offset="0.52" stop-color="#ff9e3d"/>
      <stop offset="0.74" stop-color="#ff6b2b"/>
      <stop offset="1" stop-color="#ff2e7e"/>
    </linearGradient>
    <radialGradient id="sunGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff9e3d" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#ff2e7e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ff2e7e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="floorFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4cc9f0" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#4cc9f0" stop-opacity="0"/>
    </linearGradient>
    <!-- circular sun clip -->
    <clipPath id="sunClip"><circle cx="512" cy="512" r="232"/></clipPath>
    <!-- vignette -->
    <radialGradient id="vig" cx="0.5" cy="0.46" r="0.75">
      <stop offset="0.6" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1024" height="1024" fill="url(#sky)"/>

  <!-- horizon bloom behind everything -->
  <ellipse cx="512" cy="600" rx="470" ry="60" fill="url(#sunGlow)" filter="url(#soft)"/>

  <!-- perspective dance-floor grid below the horizon (vanishing at sun center) -->
  <g stroke="url(#floorFade)" stroke-width="2.4" fill="none" opacity="0.85">
    <!-- radiating lines from vanishing point (512,600) -->
    <line x1="512" y1="600" x2="-260" y2="1024"/>
    <line x1="512" y1="600" x2="-20" y2="1024"/>
    <line x1="512" y1="600" x2="190" y2="1024"/>
    <line x1="512" y1="600" x2="340" y2="1024"/>
    <line x1="512" y1="600" x2="512" y2="1024"/>
    <line x1="512" y1="600" x2="684" y2="1024"/>
    <line x1="512" y1="600" x2="834" y2="1024"/>
    <line x1="512" y1="600" x2="1044" y2="1024"/>
    <line x1="512" y1="600" x2="1284" y2="1024"/>
    <!-- horizontal rows, spacing widens toward viewer -->
    <line x1="0" y1="628" x2="1024" y2="628"/>
    <line x1="0" y1="668" x2="1024" y2="668"/>
    <line x1="0" y1="722" x2="1024" y2="722"/>
    <line x1="0" y1="796" x2="1024" y2="796"/>
    <line x1="0" y1="894" x2="1024" y2="894"/>
    <line x1="0" y1="1018" x2="1024" y2="1018"/>
  </g>

  <!-- horizon glow line -->
  <rect x="0" y="597" width="1024" height="5" fill="#4cc9f0"/>
  <rect x="0" y="595" width="1024" height="9" fill="#4cc9f0" opacity="0.35" filter="url(#soft)"/>

  <!-- outer sun glow -->
  <circle cx="512" cy="512" r="300" fill="url(#sunGlow)" opacity="0.7" filter="url(#soft)"/>

  <!-- the sun disc -->
  <g clip-path="url(#sunClip)">
    <rect x="280" y="280" width="464" height="464" fill="url(#sun)"/>

    <!-- retro slats: dark bars that widen toward the base (lower half),
         their stepped inner edges also read as a Tikal pyramid + calendar rows -->
    <g fill="#0a0e16">
      <rect x="280" y="560" width="464" height="9"/>
      <rect x="280" y="600" width="464" height="12"/>
      <rect x="280" y="648" width="464" height="15"/>
      <rect x="280" y="706" width="464" height="20"/>
    </g>

    <!-- mirror-globe facets: faint square lattice over the sun -->
    <g stroke="#0a0e16" stroke-width="1.6" opacity="0.28">
      <line x1="512" y1="280" x2="512" y2="744"/>
      <line x1="454" y1="280" x2="454" y2="744"/>
      <line x1="570" y1="280" x2="570" y2="744"/>
      <line x1="396" y1="280" x2="396" y2="744"/>
      <line x1="628" y1="280" x2="628" y2="744"/>
      <line x1="280" y1="396" x2="744" y2="396"/>
      <line x1="280" y1="454" x2="744" y2="454"/>
      <line x1="280" y1="512" x2="744" y2="512"/>
    </g>
  </g>

  <!-- stepped-pyramid silhouette rising off the horizon, centered in front of the
       sun's base: the Tikal homage, its steps aligned to the sun's slats -->
  <g fill="#06080e">
    <path d="M 512 470
             L 452 528 L 572 528
             Z
             M 436 540 L 588 540 L 588 566 L 436 566 Z
             M 412 578 L 612 578 L 612 604 L 412 604 Z"/>
  </g>
  <!-- pyramid cyan edge-light on the sun-facing steps -->
  <g stroke="#4cc9f0" stroke-width="3" fill="none" opacity="0.85" stroke-linejoin="round">
    <path d="M 452 528 L 512 470 L 572 528"/>
    <path d="M 436 540 L 588 540"/>
    <path d="M 412 578 L 612 578"/>
  </g>

  <!-- gentle vignette to seat the mark -->
  <rect width="1024" height="1024" fill="url(#vig)"/>
</svg>
